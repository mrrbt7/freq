<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black"/>
<meta name="theme-color" content="#000000"/>
<title>FREQ</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#000;color:#e8e8e8;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:99px}
::-webkit-scrollbar-track{background:transparent}
input,select,textarea{font-size:16px!important;color-scheme:dark;font-family:inherit}
.spin{animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.auth-wrap{height:100%;display:flex;align-items:center;justify-content:center;padding:24px}
.auth-box{width:100%;max-width:340px}
.inp{width:100%;padding:10px 12px;border-radius:8px;border:1px solid #2a2a2a;background:#111;color:#e8e8e8;outline:none;margin-bottom:12px;transition:border-color .15s}
.inp:focus{border-color:#444}
.btn-lime{padding:12px 20px;border-radius:10px;border:none;background:#CAFF4C;color:#000;font-weight:800;font-family:inherit;cursor:pointer;width:100%}
.btn-lime:disabled{background:#2a2a2a;color:#555;cursor:default}
.err-box{font-size:12px;color:#FF453A;margin-bottom:12px;padding:9px 12px;border-radius:8px;background:#1a0a0a}

.app{height:100%;display:flex;flex-direction:column;overflow:hidden}

.header{padding:12px 16px;border-bottom:1px solid #111;display:flex;align-items:center;gap:10px;flex-shrink:0}
.app-name{font-size:20px;font-weight:900;letter-spacing:-1px;flex:1}
.hdr-count{font-size:11px;color:#444;font-weight:500}
.hdr-btn{background:none;border:1px solid #222;border-radius:8px;padding:6px 11px;cursor:pointer;color:#666;font-size:12px;font-family:inherit;transition:color .15s,border-color .15s;line-height:1}
.hdr-btn:hover{color:#e8e8e8;border-color:#444}
.hdr-add{background:#CAFF4C;border:none;border-radius:8px;padding:5px 13px;cursor:pointer;color:#000;font-size:20px;font-weight:800;font-family:inherit;line-height:1.2}
.hdr-add:hover{opacity:.85}

.tabs{display:flex;border-bottom:1px solid #111;flex-shrink:0}
.tab{flex:1;padding:10px 0;text-align:center;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;color:#333;border:none;border-bottom:2px solid transparent;background:none;font-family:inherit;transition:color .15s,border-color .15s}
.tab:hover:not(.t-do):not(.t-dont):not(.t-all){color:#888}
.tab.t-do{color:#FF453A;border-bottom-color:#FF453A}
.tab.t-dont{color:#30D158;border-bottom-color:#30D158}
.tab.t-all{color:#CAFF4C;border-bottom-color:#CAFF4C}

.filter-bar{padding:8px 16px;flex-shrink:0}
.filter-inp{width:100%;padding:7px 11px;border-radius:8px;border:1px solid #111;background:#080808;color:#e8e8e8;outline:none;transition:border-color .15s}
.filter-inp:focus{border-color:#2a2a2a}
.filter-inp::placeholder{color:#333}

.col-headers{display:grid;grid-template-columns:48px 1fr 58px 58px;padding:5px 16px 2px;flex-shrink:0}
.col-hdr{font-size:9px;font-weight:700;color:#252525;letter-spacing:1.2px;text-transform:uppercase}
.col-hdr.r{text-align:right}

.list{flex:1;overflow-y:auto;padding-bottom:40px}

.sec-lbl{padding:10px 16px 3px;display:flex;align-items:center;gap:7px}
.sec-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.sec-text{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase}

.row{display:grid;grid-template-columns:48px 1fr 58px 58px;align-items:center;padding:10px 16px;border-bottom:1px solid #080808;cursor:pointer;transition:background .1s;user-select:none}
.row:hover{background:#0c0c0c}
.row:active{background:#111}
.c-days{font-size:13px;font-weight:700;color:#333;font-variant-numeric:tabular-nums}
.c-name{font-size:13px;color:#e8e8e8;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-right:8px}
.c-since{font-size:12px;font-weight:600;text-align:right;font-variant-numeric:tabular-nums}
.c-over{font-size:12px;font-weight:700;text-align:right;font-variant-numeric:tabular-nums;color:#FF453A}

.empty{text-align:center;padding:72px 0;color:#252525;font-size:13px}
.empty-icon{font-size:26px;margin-bottom:10px}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,.9);backdrop-filter:blur(10px);z-index:100;display:flex;align-items:flex-end;justify-content:center}
@media(min-width:560px){.overlay{align-items:center;padding:20px}}
.modal{background:#111;border-radius:18px 18px 0 0;width:100%;max-width:480px;max-height:92vh;overflow-y:auto;border:1px solid #1a1a1a;border-bottom:none}
@media(min-width:560px){.modal{border-radius:16px;border-bottom:1px solid #1a1a1a}}

.modal-hdr{padding:16px 16px 0;display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.modal-tag{font-size:10px;font-weight:700;color:#444;letter-spacing:1.5px;text-transform:uppercase}
.modal-close{background:none;border:none;cursor:pointer;font-size:18px;color:#444;line-height:1;padding:0;transition:color .15s}
.modal-close:hover{color:#e8e8e8}

.lbl{display:block;font-size:10px;font-weight:700;color:#555;letter-spacing:1px;text-transform:uppercase;margin-bottom:5px}
.finp{width:100%;padding:10px 12px;border-radius:8px;border:1px solid #1a1a1a;background:#0d0d0d;color:#e8e8e8;outline:none;margin-bottom:14px;transition:border-color .15s}
.finp:focus{border-color:#333}
.fsel{width:100%;padding:10px 12px;border-radius:8px;border:1px solid #1a1a1a;background:#0d0d0d;color:#e8e8e8;outline:none;margin-bottom:14px;cursor:pointer}

.btn-done{width:100%;padding:12px;border-radius:10px;border:1px solid #30D15840;background:#0a140a;color:#30D158;font-weight:800;font-size:14px;font-family:inherit;cursor:pointer;margin-bottom:10px;transition:background .15s}
.btn-done:hover{background:#0d1f0d}
.btn-row{display:flex;gap:8px}
.btn-cancel{flex:1;padding:10px;border-radius:9px;border:1px solid #1a1a1a;background:transparent;color:#555;font-family:inherit;font-size:13px;cursor:pointer;transition:color .15s}
.btn-cancel:hover{color:#e8e8e8}
.btn-save{flex:2;padding:10px;border-radius:9px;border:none;background:#CAFF4C;color:#000;font-weight:800;font-family:inherit;font-size:13px;cursor:pointer}
.btn-del{padding:8px 13px;border-radius:8px;border:1px solid #FF453A22;background:transparent;color:#FF453A55;font-family:inherit;font-size:12px;cursor:pointer;transition:color .15s,border-color .15s}
.btn-del:hover{color:#FF453A;border-color:#FF453A66}

.scorecard{display:flex;border-radius:8px;border:1px solid #1a1a1a;overflow:hidden;background:#0a0a0a;margin-bottom:14px}
.sc-cell{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:9px 4px;border-right:1px solid #141414}
.sc-cell:last-child{border-right:none}
.sc-lbl{font-size:8px;font-weight:700;letter-spacing:1px;color:#444;text-transform:uppercase}
.sc-val{font-size:20px;font-weight:800;line-height:1}

.ld-bar{display:flex;align-items:center;gap:6px;padding:7px 10px;background:#061406;border-radius:7px;border:1px solid #30D15820;margin-bottom:12px;font-size:11px}

.loading-wrap{height:100%;display:flex;align-items:center;justify-content:center}
</style>
</head>
<body>
<div id="root"></div>
<script>
const SURL='https://hnfvtllodmgsipyuwzsx.supabase.co';
const SKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhuZnZ0bGxvZG1nc2lweXV3enN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3MjgwNzEsImV4cCI6MjA4NzMwNDA3MX0.4YzxxQK9PPPo1qGs9mEb6JhE5Ic6Y3_Lt9CGYtCCZEU';
const db=supabase.createClient(SURL,SKEY);
const WDN=["sunday","monday","tuesday","wednesday","thursday","friday","saturday"];

function genId(){return crypto.randomUUID();}
function todayStr(){
  const et=new Date(new Date().toLocaleString("en-US",{timeZone:"America/New_York"}));
  return et.toISOString().split("T")[0];
}
function freqDays(f){
  if(!f)return null;
  const s=f.trim().toLowerCase();
  if(WDN.includes(s)||["weekday","weekdays","weekend","weekends","weekly"].includes(s))return 7;
  if(s==="daily")return 1;if(s==="monthly")return 30;if(s==="yearly")return 365;
  const n=parseInt(s);return(!isNaN(n)&&n>0)?n:null;
}
function daysSinceDone(cl){
  if(!cl||!cl.length)return null;
  const last=[...cl].sort((a,b)=>b.doneAt.localeCompare(a.doneAt))[0];
  if(!last||!last.doneAt)return null;
  return Math.round((new Date()-new Date(last.doneAt))/(1000*60*60*24));
}
function lastDoneStr(cl){
  if(!cl||!cl.length)return null;
  return [...cl].sort((a,b)=>b.doneAt.localeCompare(a.doneAt))[0]?.doneAt?.split("T")[0]||null;
}
function nextDue(frequency){
  const fd=freqDays(frequency);if(!fd)return todayStr();
  const d=new Date(todayStr()+"T00:00:00");d.setDate(d.getDate()+fd);
  return d.toISOString().split("T")[0];
}
function fmtDate(s){
  if(!s)return"—";
  return new Date(s+"T00:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
}
function esc(s){return(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

// ── State ─────────────────────────────────────────────────────────────
const S={user:null,tasks:[],raw:{},boards:[],tab:"do",q:"",modal:null};

// ── Auth ──────────────────────────────────────────────────────────────
function renderAuth(){
  document.getElementById("root").innerHTML=`
  <div class="auth-wrap"><div class="auth-box">
    <div style="font-size:22px;font-weight:900;letter-spacing:-1px;margin-bottom:4px">FREQ</div>
    <div style="font-size:10px;color:#1a5c6a;letter-spacing:2px;font-weight:700;text-transform:uppercase;margin-bottom:28px">frequency tracker</div>
    <label class="lbl">Email</label>
    <input class="inp" id="ae" type="email" placeholder="you@example.com" autocapitalize="none"/>
    <label class="lbl">Password</label>
    <input class="inp" id="ap" type="password" placeholder="••••••••" style="margin-bottom:16px"/>
    <div id="aerr" style="display:none" class="err-box"></div>
    <button class="btn-lime" id="abtn">Sign In</button>
  </div></div>`;
  const e=document.getElementById("ae"),p=document.getElementById("ap"),err=document.getElementById("aerr"),btn=document.getElementById("abtn");
  async function go(){
    if(!e.value.trim()||!p.value){err.textContent="Required";err.style.display="block";return;}
    btn.disabled=true;btn.textContent="…";
    const{data,error}=await db.auth.signInWithPassword({email:e.value.trim(),password:p.value});
    if(error){err.textContent=error.message;err.style.display="block";btn.disabled=false;btn.textContent="Sign In";return;}
    S.user=data.user;
    document.getElementById("root").innerHTML=`<div class="loading-wrap"><div class="spin" style="width:22px;height:22px;border:2px solid #1a1a1a;border-top-color:#CAFF4C;border-radius:50%"></div></div>`;
    await loadData();renderApp();
  }
  btn.addEventListener("click",go);
  [e,p].forEach(el=>el.addEventListener("keydown",ev=>{if(ev.key==="Enter")go();}));
}

// ── Data ──────────────────────────────────────────────────────────────
async function loadData(){
  const{data:mem}=await db.from("board_members").select("board_id,boards(id,name,emoji)").eq("user_id",S.user.id);
  S.boards=(mem||[]).map(m=>m.boards).filter(Boolean);
  const ids=S.boards.map(b=>b.id);
  if(!ids.length){S.tasks=[];return;}
  const{data:rows}=await db.from("tasks").select("*").in("board_id",ids).eq("done",false).not("frequency","is",null).neq("frequency","");
  S.raw={};
  S.tasks=(rows||[]).filter(r=>r.frequency&&freqDays(r.frequency)!==null).map(r=>{
    S.raw[r.id]=r;
    const fd=freqDays(r.frequency);
    const cl=r.completion_log||[];
    const sd=daysSinceDone(cl);
    const over=(fd!==null&&sd!==null&&sd>fd)?sd-fd:null;
    const due=fd!==null&&sd!==null&&sd===fd;
    return{id:r.id,title:r.title||"Untitled",freq:fd,since:sd,over,due,isDo:sd===null||over!==null||due};
  });
}
async function saveTask(id,upd){await db.from("tasks").update(upd).eq("id",id);await loadData();render();}
async function createTask(data){await db.from("tasks").insert(data);await loadData();render();}
async function deleteTask(id){await db.from("tasks").update({done:true}).eq("id",id);await loadData();render();}

// ── App Shell ─────────────────────────────────────────────────────────
function renderApp(){
  document.getElementById("root").innerHTML=`
  <div class="app">
    <div class="header">
      <span class="app-name">FREQ</span>
      <span class="hdr-count" id="hdr-count"></span>
      <button class="hdr-btn" id="btn-so">sign out</button>
      <button class="hdr-add" id="btn-add">+</button>
    </div>
    <div class="tabs">
      <button class="tab" data-tab="do">DO</button>
      <button class="tab" data-tab="dont">DON'T</button>
      <button class="tab" data-tab="all">ALL</button>
    </div>
    <div class="filter-bar"><input class="filter-inp" id="fi" placeholder="Filter tasks…" type="search"/></div>
    <div class="col-headers">
      <span class="col-hdr">Days</span>
      <span class="col-hdr">Task</span>
      <span class="col-hdr r">Since</span>
      <span class="col-hdr r">Over</span>
    </div>
    <div class="list" id="list"></div>
    <div id="mroot"></div>
  </div>`;

  document.getElementById("btn-so").addEventListener("click",async()=>{await db.auth.signOut();S.user=null;S.tasks=[];renderAuth();});
  document.getElementById("btn-add").addEventListener("click",()=>{S.modal={type:"add"};renderModal();});
  document.getElementById("fi").addEventListener("input",e=>{S.q=e.target.value;render();});
  document.querySelectorAll(".tab").forEach(btn=>btn.addEventListener("click",()=>{S.tab=btn.dataset.tab;render();}));
  render();
}

// ── Main Render ───────────────────────────────────────────────────────
function render(){
  // Tabs
  document.querySelectorAll(".tab").forEach(btn=>{
    const t=btn.dataset.tab;
    btn.className="tab"+(S.tab===t?" t-"+t:"");
  });

  const listEl=document.getElementById("list");
  if(!listEl)return;

  let rows=S.tasks.filter(t=>S.tab==="do"?t.isDo:S.tab==="dont"?!t.isDo:true);
  if(S.q.trim())rows=rows.filter(t=>t.title.toLowerCase().includes(S.q.toLowerCase()));

  // Sort
  if(S.tab==="do"){
    rows.sort((a,b)=>{
      if(a.over!==null&&b.over!==null)return b.over-a.over;
      if(a.over!==null)return -1;if(b.over!==null)return 1;
      if(a.due&&!b.due)return -1;if(b.due&&!a.due)return 1;
      return 0;
    });
  }else if(S.tab==="dont"){
    rows.sort((a,b)=>{
      const ar=(a.freq&&a.since!==null)?a.freq-a.since:9999;
      const br=(b.freq&&b.since!==null)?b.freq-b.since:9999;
      return ar-br;
    });
  }else{
    rows.sort((a,b)=>{
      const sc=t=>t.over!==null?0:t.due?1:t.since===null?3:2;
      const d=sc(a)-sc(b);if(d)return d;
      if(a.over!==null&&b.over!==null)return b.over-a.over;
      const ar=(a.freq&&a.since!==null)?a.freq-a.since:9999;
      const br=(b.freq&&b.since!==null)?b.freq-b.since:9999;
      return ar-br;
    });
  }

  const hdr=document.getElementById("hdr-count");
  if(hdr)hdr.textContent=rows.length+" task"+(rows.length!==1?"s":"");

  if(!rows.length){
    listEl.innerHTML=`<div class="empty"><div class="empty-icon">${S.tab==="do"?"✓":"◡"}</div>${S.tab==="do"?"Nothing overdue or due":S.tab==="dont"?"All good":"No tasks found"}</div>`;
    return;
  }

  function section(label,color,items){
    if(!items.length)return"";
    return`<div class="sec-lbl"><div class="sec-dot" style="background:${color}"></div><span class="sec-text" style="color:${color}">${label}</span></div>`+items.map(buildRow).join("");
  }

  let html="";
  if(S.tab==="do"){
    html+=section("Overdue","#FF453A",rows.filter(r=>r.over!==null));
    html+=section("Due","#FF9F0A",rows.filter(r=>r.due&&r.over===null));
    html+=section("Never Done","#333",rows.filter(r=>r.since===null));
  }else if(S.tab==="all"){
    html+=section("Overdue","#FF453A",rows.filter(r=>r.over!==null));
    html+=section("Due","#FF9F0A",rows.filter(r=>r.due&&r.over===null));
    html+=section("Not Due Yet","#30D158",rows.filter(r=>!r.isDo&&r.since!==null));
    html+=section("Never Done","#333",rows.filter(r=>r.since===null&&!r.due&&r.over===null));
  }else{
    html=rows.map(buildRow).join("");
  }

  listEl.innerHTML=html;
  listEl.querySelectorAll(".row").forEach(el=>el.addEventListener("click",()=>{S.modal={type:"edit",id:el.dataset.id};renderModal();}));
}

function buildRow(t){
  const sv=t.since!==null?t.since+"d":"—";
  const ov=t.over!==null?t.over+"d":"";
  const sc=t.since===null?"#333":t.over!==null?"#FF453A":t.due?"#FF9F0A":"#30D158";
  return`<div class="row" data-id="${t.id}"><span class="c-days">${t.freq}</span><span class="c-name" title="${esc(t.title)}">${esc(t.title)}</span><span class="c-since" style="color:${sc}">${sv}</span><span class="c-over">${esc(ov)}</span></div>`;
}

// ── Modal ─────────────────────────────────────────────────────────────
function closeModal(){S.modal=null;const r=document.getElementById("mroot");if(r)r.innerHTML="";}

function renderModal(){
  const root=document.getElementById("mroot");if(!root)return;
  if(!S.modal){root.innerHTML="";return;}
  S.modal.type==="edit"?renderEditModal(root,S.modal.id):renderAddModal(root);
}

function renderEditModal(root,id){
  const raw=S.raw[id];if(!raw){root.innerHTML="";return;}
  const cl=raw.completion_log||[];
  const fd=freqDays(raw.frequency);
  const sd=daysSinceDone(cl);
  const over=(fd!==null&&sd!==null&&sd>fd)?sd-fd:null;
  const due=fd!==null&&sd!==null&&sd===fd;
  const ld=lastDoneStr(cl);
  const delta=fd!==null&&sd!==null?fd-sd:null;
  const dc=delta===null?"#444":delta<0?"#FF453A":delta===0?"#FF9F0A":"#30D158";
  const sc=over!==null?"#FF453A":due?"#FF9F0A":sd!==null?"#30D158":"#444";

  root.innerHTML=`
  <div class="overlay" id="ov">
    <div class="modal">
      <div class="modal-hdr">
        <span class="modal-tag">Edit Task</span>
        <div style="display:flex;gap:8px;align-items:center">
          <button class="btn-del" id="bdel">Delete</button>
          <button class="modal-close" id="bclose">✕</button>
        </div>
      </div>
      <div style="padding:0 16px 20px">
        <label class="lbl">Title</label>
        <input class="finp" id="ft" value="${esc(raw.title||"")}"/>
        <label class="lbl">Frequency</label>
        <input class="finp" id="ff" value="${esc(raw.frequency||"")}" placeholder="e.g. 7, daily, weekly"/>
        <label class="lbl">Notes</label>
        <textarea class="finp" id="fn" rows="3" style="resize:vertical;margin-bottom:14px">${esc(raw.notes||"")}</textarea>

        <div class="scorecard">
          <div class="sc-cell"><div class="sc-lbl">Freq</div><div class="sc-val" style="color:#444">${fd!==null?fd:"—"}</div></div>
          <div class="sc-cell"><div class="sc-lbl">Since</div><div class="sc-val" style="color:${sc}">${sd!==null?sd+"d":"—"}</div></div>
          <div class="sc-cell"><div class="sc-lbl">Δ Tally</div><div class="sc-val" style="color:${dc}">${delta!==null?(delta>0?"+"+delta:delta):"—"}</div></div>
        </div>

        ${ld?`<div class="ld-bar"><span style="color:#30D158;font-weight:700">✓ Last done:</span><span style="color:#30D158">${fmtDate(ld)}</span></div>`:""}

        <button class="btn-done" id="bdone">✓ Mark Done${fd?" → resets in "+fd+"d":""}</button>
        <div class="btn-row">
          <button class="btn-cancel" id="bcancel">Cancel</button>
          <button class="btn-save" id="bsave">Save</button>
        </div>
      </div>
    </div>
  </div>`;

  document.getElementById("ov").addEventListener("click",e=>{if(e.target.id==="ov")closeModal();});
  document.getElementById("bclose").addEventListener("click",closeModal);
  document.getElementById("bcancel").addEventListener("click",closeModal);
  document.getElementById("bdel").addEventListener("click",async()=>{
    if(!confirm("Delete this task?"))return;
    await deleteTask(id);closeModal();
  });
  document.getElementById("bdone").addEventListener("click",async()=>{
    const newCl=[...cl,{id:genId(),doneAt:new Date().toISOString(),note:""}];
    await saveTask(id,{completion_log:newCl,due_date:nextDue(raw.frequency),status:"list"});
    closeModal();
  });
  document.getElementById("bsave").addEventListener("click",async()=>{
    const title=document.getElementById("ft").value.trim();
    const freq=document.getElementById("ff").value.trim();
    const notes=document.getElementById("fn").value;
    if(!title)return;
    await saveTask(id,{title,frequency:freq||null,notes});
    closeModal();
  });
}

function renderAddModal(root){
  const opts=S.boards.map(b=>`<option value="${b.id}">${esc(b.emoji||"")} ${esc(b.name)}</option>`).join("");
  root.innerHTML=`
  <div class="overlay" id="ov">
    <div class="modal">
      <div class="modal-hdr">
        <span class="modal-tag">New Task</span>
        <button class="modal-close" id="bclose">✕</button>
      </div>
      <div style="padding:0 16px 20px">
        <label class="lbl">Title</label>
        <input class="finp" id="ft" placeholder="What needs to get done?"/>
        <label class="lbl">Frequency</label>
        <input class="finp" id="ff" placeholder="e.g. 7, daily, weekly"/>
        ${S.boards.length>1?`<label class="lbl">Board</label><select class="fsel" id="fb">${opts}</select>`:`<input type="hidden" id="fb" value="${S.boards[0]?.id||""}"/>`}
        <div class="btn-row">
          <button class="btn-cancel" id="bcancel">Cancel</button>
          <button class="btn-save" id="bsave">Add Task</button>
        </div>
      </div>
    </div>
  </div>`;
  document.getElementById("ov").addEventListener("click",e=>{if(e.target.id==="ov")closeModal();});
  document.getElementById("bclose").addEventListener("click",closeModal);
  document.getElementById("bcancel").addEventListener("click",closeModal);
  setTimeout(()=>document.getElementById("ft")?.focus(),50);
  document.getElementById("bsave").addEventListener("click",async()=>{
    const title=document.getElementById("ft").value.trim();
    const freq=document.getElementById("ff").value.trim();
    const boardId=document.getElementById("fb").value;
    if(!title||!boardId)return;
    await createTask({id:genId(),board_id:boardId,title,frequency:freq||null,status:"list",priority:"normal",done:false,manual_order:Date.now(),completion_log:[],due_date:todayStr()});
    closeModal();
  });
}

// ── Boot ──────────────────────────────────────────────────────────────
(async()=>{
  const{data:{session}}=await db.auth.getSession();
  if(session){
    S.user=session.user;
    document.getElementById("root").innerHTML=`<div class="loading-wrap"><div class="spin" style="width:22px;height:22px;border:2px solid #1a1a1a;border-top-color:#CAFF4C;border-radius:50%"></div></div>`;
    await loadData();renderApp();
  }else{renderAuth();}
})();
</script>
</body>
</html>
